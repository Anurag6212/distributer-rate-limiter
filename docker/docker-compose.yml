version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: rate-limit-redis
    ports:
      - "6379:6379"

  api1:
    build: ..
    container_name: rate-limit-api1
    environment:
      - PORT=3000
    depends_on:
      - redis

  api2:
    build: ..
    container_name: rate-limit-api2
    environment:
      - PORT=3000
    depends_on:
      - redis

  api3:
    build: ..
    container_name: rate-limit-api3
    environment:
      - PORT=3000
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    container_name: rate-limit-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
      - api3